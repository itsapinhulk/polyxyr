name: tests

on:
  push:
    branches: []
  pull_request:
    branches: [main]

jobs:
  rust:
    name: rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: cargo test  # rustup/cargo are preinstalled on ubuntu-latest
        working-directory: src/rust
        run: cargo test --all-features

  python:
    name: python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
      - name: Install package and pytest
        run: uv venv && uv pip install ./src/python pytest
      - name: pytest
        run: uv run pytest test/py
