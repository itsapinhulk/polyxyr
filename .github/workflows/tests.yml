name: tests

on:
  push:
    branches: []
  pull_request:
    branches: [main]

jobs:
  rust:
    name: rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test  # rustup/cargo are preinstalled on ubuntu-latest
        working-directory: src/rust
        run: cargo test --all-features
