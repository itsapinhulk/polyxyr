name: tag

# Manually cut a release tag from CI. Reads the version from the manifests and
# pushes `v<version>`, which triggers the publish workflow.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    # workflow_dispatch has no branch filter; only allow cutting a tag from main.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Rust and Python versions match
        run: scripts/check-versions.sh

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: scripts/tag.sh
