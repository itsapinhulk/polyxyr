name: tag

# Manually cut a release tag from CI. Reads the version from the manifests and
# pushes `v<version>`, which triggers the publish workflow.

on:
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Verify Rust and Python versions match
        run: scripts/check-versions.sh

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: scripts/tag.sh
